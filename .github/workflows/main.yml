name: Build and Release

on:
  push:
    branches: [ "main" ]  # Запуск при каждом пуше в ветку main
  workflow_dispatch:      # Позволяет запускать сборку вручную через вкладку Actions

permissions:
  contents: write         # Разрешение для Actions создавать релизы и загружать файлы

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin' # Надежный дистрибутив OpenJDK (Eclipse Temurin)

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Generate Release Tag
      id: tag
      run: echo "release_tag=v1.21.4-build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: Ancient Client ${{ steps.tag.outputs.release_tag }}
        draft: false
        prerelease: true # Помечает как pre-release (beta), так как проект в разработке
        files: |
          build/libs/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Токен создается автоматически самим GitHub
